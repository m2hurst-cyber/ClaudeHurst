default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USER", "hurst") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "hurst") %>

development:
  <<: *default
  database: claudehurst_development

test:
  <<: *default
  database: claudehurst_test

production:
  <<: *default
  database: claudehurst_production
  username: claudehurst
  password: <%= ENV["CLAUDEHURST_DATABASE_PASSWORD"] %>
