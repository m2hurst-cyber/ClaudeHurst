default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USER", "hurst") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "hurst") %>

development:
  <<: *default
  database: great_southern_copacker_development

test:
  <<: *default
  database: great_southern_copacker_test

production:
  <<: *default
  database: great_southern_copacker_production
  username: greatsoutherncopacker
  password: <%= ENV["GREAT_SOUTHERN_COPACKER_DATABASE_PASSWORD"] %>
